<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Grid Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="gallery">
        <img src="assets/img1.jpg" alt="Bridge and blue water" class="img-1">
        <img src="assets/img2.jpg" alt="White apartment buildings" class="img-2">
        <img src="assets/img3.jpg" alt="Foggy rock on beach" class="img-3">
        <img src="assets/img4.jpg" alt="White living room" class="img-4">
        <img src="assets/img5.jpg" alt="Colorful circular flags" class="img-5">
        <img src="assets/img6.jpg" alt="Building with red doors" class="img-6">
    </div>

</body>
</html>
